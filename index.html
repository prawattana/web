<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="รายจ่าย">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <title>รายจ่าย</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

    :root{
      --bg:#f5f5f7;
      --card:#ffffff;
      --border:rgba(0,0,0,.08);
      --text:#1d1d1f;
      --muted:#86868b;
      --blue:#007aff;
      --red:#ff3b30;
      --green:#34c759;
      --nav-h:56px;
      --safe-b:env(safe-area-inset-bottom,0px);
    }

    body{
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
      background:var(--bg);
      color:var(--text);
      max-width:430px;
      margin:0 auto;
      min-height:100dvh;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }

    .page{display:none;min-height:100dvh;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px)}
    .page.active{display:block}

    /* BOTTOM NAV */
    .bottom-nav{
      position:fixed;bottom:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:430px;
      background:rgba(255,255,255,.85);
      backdrop-filter:saturate(180%) blur(20px);
      -webkit-backdrop-filter:saturate(180%) blur(20px);
      border-top:1px solid var(--border);
      display:flex;
      padding-bottom:var(--safe-b);
      z-index:500;
    }
    .nav-btn{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:3px;border:none;background:none;color:var(--muted);
      font-size:10px;font-weight:500;cursor:pointer;
      padding:8px 0 6px;transition:color .15s;font-family:inherit;
    }
    .nav-btn.active{color:var(--blue)}
    .nav-icon{font-size:24px;line-height:1}

    /* DASHBOARD */
    .dash-header{
      background:linear-gradient(175deg,#1c1c1e 0%,#2c2c2e 100%);
      color:white;padding:56px 20px 28px;position:relative;overflow:hidden;
    }
    .dash-header::before{
      content:'';position:absolute;top:-60px;right:-40px;
      width:200px;height:200px;
      background:radial-gradient(circle,rgba(0,122,255,.3) 0%,transparent 70%);
    }
    .dash-month-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .month-nav{display:flex;align-items:center;gap:12px}
    .month-btn{
      width:30px;height:30px;border-radius:50%;
      background:rgba(255,255,255,.12);border:none;color:white;
      font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:background .15s;
    }
    .month-btn:active{background:rgba(255,255,255,.25)}
    .month-label{font-size:16px;font-weight:600;min-width:90px;text-align:center}
    .dash-total-lbl{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:6px}
    .dash-total{font-size:44px;font-weight:700;letter-spacing:-1.5px;line-height:1}
    .dash-sub{font-size:13px;color:rgba(255,255,255,.45);margin-top:6px}

    .pills{display:flex;gap:10px;padding:16px 16px 0}
    .pill{
      flex:1;background:var(--card);border-radius:14px;padding:14px 12px;
      box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);text-align:center;
    }
    .pill-val{font-size:18px;font-weight:700;color:var(--blue)}
    .pill-lbl{font-size:11px;color:var(--muted);margin-top:3px}

    .section{padding:16px 16px 0}
    .section-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
    .cat-card{background:var(--card);border-radius:16px;padding:4px 0;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);overflow:hidden}
    .bar-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--bg)}
    .bar-row:last-child{border-bottom:none}
    .bar-icon-box{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .bar-body{flex:1;min-width:0}
    .bar-top{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px}
    .bar-name{font-weight:500}
    .bar-amt{font-weight:700}
    .bar-track{height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
    .bar-fill{height:100%;border-radius:2px;transition:width .5s ease}

    .txn-card{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04)}
    .date-hdr{
      padding:8px 14px 4px;font-size:11px;font-weight:700;color:var(--muted);
      text-transform:uppercase;letter-spacing:.06em;
      display:flex;justify-content:space-between;background:var(--bg);
    }
    .txn-row{
      display:flex;align-items:center;gap:12px;padding:11px 14px;
      border-bottom:1px solid var(--bg);cursor:pointer;transition:background .12s;
    }
    .txn-row:last-child{border-bottom:none}
    .txn-row:active{background:#f5f5f7}
    .txn-info{flex:1;min-width:0}
    .txn-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .txn-cat{font-size:12px;color:var(--muted);margin-top:1px}
    .txn-amt{font-size:15px;font-weight:700;color:var(--red);flex-shrink:0}
    .empty{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-icon{font-size:48px;margin-bottom:12px}

    /* ADD PAGE */
    .add-header{background:var(--card);border-bottom:1px solid var(--border);padding:56px 20px 16px}
    .add-header h1{font-size:28px;font-weight:700;letter-spacing:-.5px}
    .form-wrap{padding:16px}

    .month-picker-bar{
      background:var(--card);border-radius:14px;padding:4px;
      display:flex;align-items:center;gap:4px;
      box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px;
    }
    .mp-btn{
      width:32px;height:32px;border:none;background:none;color:var(--muted);
      font-size:18px;cursor:pointer;border-radius:10px;
      display:flex;align-items:center;justify-content:center;transition:background .12s;flex-shrink:0;
    }
    .mp-btn:active{background:var(--bg)}
    .mp-label{flex:1;text-align:center;font-size:15px;font-weight:600;color:var(--text)}

    .amt-wrap{
      background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px;
      box-shadow:0 1px 3px rgba(0,0,0,.06);
      display:flex;align-items:center;justify-content:center;gap:4px;
    }
    .amt-sym{font-size:28px;font-weight:600;color:var(--muted)}
    .amt-input{
      font-size:52px;font-weight:700;width:200px;
      border:none;outline:none;color:var(--blue);
      text-align:center;background:none;font-family:inherit;letter-spacing:-1px;
    }
    .amt-input::placeholder{color:rgba(0,122,255,.3)}

    .form-card{background:var(--card);border-radius:16px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .form-row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--bg)}
    .form-row:last-child{border-bottom:none}
    .form-lbl{font-size:15px;font-weight:500;width:72px;flex-shrink:0;color:var(--text)}
    .form-input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;background:none;color:var(--text);text-align:right}
    .form-input::placeholder{color:var(--muted)}

    .chips-section{background:var(--card);border-radius:16px;padding:14px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .chips-lbl{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
    .chips-grid{display:flex;flex-wrap:wrap;gap:7px}
    .chip{
      padding:7px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);
      font-size:13px;font-weight:500;color:var(--text);cursor:pointer;font-family:inherit;transition:all .12s;
    }
    .chip.sel{background:var(--blue);border-color:var(--blue);color:white}
    .chip-add{
      padding:7px 13px;border-radius:20px;border:1.5px dashed var(--border);
      background:none;font-size:13px;font-weight:500;color:var(--blue);
      cursor:pointer;font-family:inherit;
    }

    .save-btn{
      width:100%;padding:16px;border:none;border-radius:14px;
      background:var(--blue);color:white;font-size:17px;font-weight:600;
      cursor:pointer;font-family:inherit;transition:transform .1s,opacity .1s,background .2s;
      box-shadow:0 4px 14px rgba(0,122,255,.35);
    }
    .save-btn:active{transform:scale(.98);opacity:.9}

    /* SHEETS */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:600;display:none;align-items:flex-end;justify-content:center}
    .overlay.open{display:flex}
    .sheet{
      background:var(--card);border-radius:22px 22px 0 0;
      width:100%;max-width:430px;padding:0 20px calc(var(--safe-b) + 24px);
      max-height:85vh;overflow-y:auto;
      transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    }
    .overlay.open .sheet{transform:translateY(0)}
    .handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 20px}
    .sheet-title{font-size:19px;font-weight:700;margin-bottom:20px}
    .sheet-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bg);font-size:15px}
    .sheet-row:last-of-type{border-bottom:none}
    .sheet-row-lbl{color:var(--muted)}
    .sheet-row-val{font-weight:500}
    .sheet-actions{display:flex;gap:10px;margin-top:20px}
    .btn-del{flex:1;padding:14px;border:none;border-radius:12px;background:#fff1f0;color:var(--red);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn-close{flex:2;padding:14px;border:none;border-radius:12px;background:var(--bg);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}

    .field-wrap{margin-bottom:14px}
    .field-lbl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
    .field-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;outline:none;font-family:inherit;background:var(--bg);transition:border-color .15s}
    .field-input:focus{border-color:var(--blue)}
    .btn-confirm{width:100%;padding:15px;border:none;border-radius:12px;background:var(--blue);color:white;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
  </style>
</head>
<body>

<!-- DASHBOARD -->
<div id="pg-dash" class="page active">
  <div class="dash-header">
    <div class="dash-month-row">
      <div class="month-nav">
        <button class="month-btn" onclick="changeMonth(-1)">‹</button>
        <span class="month-label" id="dashMonthLabel"></span>
        <button class="month-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="dash-total-lbl">รายจ่ายรวม</div>
    <div class="dash-total" id="dashTotal">฿0</div>
    <div class="dash-sub" id="dashSub">0 รายการ</div>
  </div>

  <div class="pills">
    <div class="pill"><div class="pill-val" id="statDays">0</div><div class="pill-lbl">วันที่ใช้จ่าย</div></div>
    <div class="pill"><div class="pill-val" id="statAvg">฿0</div><div class="pill-lbl">เฉลี่ย/วัน</div></div>
    <div class="pill"><div class="pill-val" id="statCats">0</div><div class="pill-lbl">หมวดหมู่</div></div>
  </div>

  <div class="section" id="catSection" style="display:none">
    <div class="section-title">แยกตามหมวดหมู่</div>
    <div class="cat-card" id="catBars"></div>
  </div>

  <div class="section" style="padding-bottom:16px">
    <div class="section-title">รายการ</div>
    <div id="txnList"></div>
  </div>
</div>

<!-- ADD PAGE -->
<div id="pg-add" class="page">
  <div class="add-header"><h1>บันทึกรายจ่าย</h1></div>
  <div class="form-wrap">
    <div class="month-picker-bar">
      <button class="mp-btn" onclick="changeAddMonth(-1)">‹</button>
      <span class="mp-label" id="addMonthLabel"></span>
      <button class="mp-btn" onclick="changeAddMonth(1)">›</button>
    </div>

    <div class="amt-wrap">
      <span class="amt-sym">฿</span>
      <input type="number" class="amt-input" id="amtIn" placeholder="0" inputmode="decimal">
    </div>

    <div class="chips-section">
      <div class="chips-lbl">หมวดหมู่</div>
      <div class="chips-grid" id="catChips"></div>
    </div>

    <div class="form-card">
      <div class="form-row">
        <span class="form-lbl">บันทึก</span>
        <input type="text" class="form-input" id="noteIn" placeholder="รายละเอียด (ไม่บังคับ)">
      </div>
      <div class="form-row">
        <span class="form-lbl">วันที่</span>
        <input type="date" class="form-input" id="dateIn">
      </div>
    </div>

    <button class="save-btn" id="saveBtn" onclick="saveExp()">บันทึก</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-dash" onclick="goPage('dash')">
    <span class="nav-icon">📊</span><span>Dashboard</span>
  </button>
  <button class="nav-btn" id="nav-add" onclick="goPage('add')">
    <span class="nav-icon">➕</span><span>บันทึก</span>
  </button>
</nav>

<!-- TRANSACTION DETAIL SHEET -->
<div class="overlay" id="txnOverlay" onclick="backdropClose(event,'txnOverlay')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="txnSheetTitle"></div>
    <div id="txnSheetBody"></div>
    <div class="sheet-actions">
      <button class="btn-del" id="txnDelBtn">ลบ</button>
      <button class="btn-close" onclick="closeSheet('txnOverlay')">ปิด</button>
    </div>
  </div>
</div>

<!-- ADD CATEGORY SHEET -->
<div class="overlay" id="catOverlay" onclick="backdropClose(event,'catOverlay')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">เพิ่มหมวดหมู่</div>
    <div class="field-wrap">
      <div class="field-lbl">ชื่อหมวดหมู่</div>
      <input type="text" class="field-input" id="newCatName" placeholder="เช่น ค่าอาหาร, ค่าเช่า...">
    </div>
    <div class="field-wrap">
      <div class="field-lbl">ไอคอน (emoji)</div>
      <input type="text" class="field-input" id="newCatIcon" placeholder="🏷️" maxlength="4" style="font-size:22px;text-align:center">
    </div>
    <button class="btn-confirm" onclick="saveCustomCat()">เพิ่มหมวดหมู่</button>
  </div>
</div>

<script>
const DEFAULT_CATS = [
  {id:'spaylater', name:'Spaylater',     icon:'💳', color:'#ff9500'},
  {id:'scash',     name:'Scash',         icon:'💵', color:'#34c759'},
  {id:'electric',  name:'ค่าไฟ',         icon:'⚡', color:'#ffd60a'},
  {id:'ais',       name:'AIS',           icon:'📱', color:'#007aff'},
  {id:'nt',        name:'NT',            icon:'🌐', color:'#5856d6'},
  {id:'fuel',      name:'ค่าน้ำมัน',    icon:'⛽', color:'#ff3b30'},
  {id:'insurance', name:'ค่าประกัน',    icon:'🛡️', color:'#30d158'},
  {id:'exam',      name:'ค่าสอบกองทุน', icon:'📋', color:'#bf5af2'},
  {id:'other',     name:'อื่นๆ',         icon:'📦', color:'#8e8e93'},
];

const EXTRA_COLORS = ['#ff9500','#34c759','#007aff','#5856d6','#bf5af2','#ff3b30','#30d158','#ff6b6b','#4ecdc4'];

let st = {
  dashMonth: new Date().toISOString().slice(0,7),
  addMonth:  new Date().toISOString().slice(0,7),
  expenses: [],
  cats: [],
  selCat: null,
};

function load() {
  const c = localStorage.getItem('xp_cats2');
  const e = localStorage.getItem('xp_data2');
  st.cats     = c ? JSON.parse(c) : [...DEFAULT_CATS];
  st.expenses = e ? JSON.parse(e) : [];
}
function persist() {
  localStorage.setItem('xp_cats2', JSON.stringify(st.cats));
  localStorage.setItem('xp_data2', JSON.stringify(st.expenses));
}

function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }

function fmtMoney(n) {
  return '฿'+Number(n).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2});
}

function getCat(id) {
  return st.cats.find(c=>c.id===id) || {name:'ไม่ระบุ',icon:'❓',color:'#8e8e93'};
}

function monthStr(ym) {
  const [y,m] = ym.split('-');
  const names = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return names[parseInt(m)-1]+' '+(parseInt(y)+543);
}

function shiftMonth(ym, dir) {
  const [y,m] = ym.split('-').map(Number);
  const d = new Date(y, m-1+dir, 1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

function monthExps(ym) { return st.expenses.filter(e=>e.date.startsWith(ym)); }

function dateLbl(ds) {
  const d = new Date(ds+'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((now-d)/86400000);
  const dow = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'][d.getDay()];
  const mm  = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][d.getMonth()];
  const lbl = dow+' '+d.getDate()+' '+mm;
  if(diff===0) return 'วันนี้ · '+lbl;
  if(diff===1) return 'เมื่อวาน · '+lbl;
  return lbl;
}

// NAVIGATION
function goPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  if(id==='dash') renderDash();
  if(id==='add') initAddPage();
}

// DASHBOARD
function renderDash() {
  document.getElementById('dashMonthLabel').textContent = monthStr(st.dashMonth);
  const exps  = monthExps(st.dashMonth);
  const total = exps.reduce((s,e)=>s+e.amount, 0);
  const days  = new Set(exps.map(e=>e.date)).size;
  document.getElementById('dashTotal').textContent = fmtMoney(total);
  document.getElementById('dashSub').textContent   = exps.length+' รายการ';
  document.getElementById('statDays').textContent  = days;
  document.getElementById('statAvg').textContent   = days ? fmtMoney(Math.round(total/days)) : '฿0';

  const catMap = {};
  exps.forEach(e=>{ catMap[e.categoryId]=(catMap[e.categoryId]||0)+e.amount; });
  const sorted = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  document.getElementById('statCats').textContent = sorted.length;

  const catSec = document.getElementById('catSection');
  catSec.style.display = sorted.length ? 'block' : 'none';
  const maxAmt = sorted[0]?.[1]||1;
  document.getElementById('catBars').innerHTML = sorted.map(([cid,amt])=>{
    const cat = getCat(cid);
    const pct = Math.round((amt/maxAmt)*100);
    const pctT= total ? Math.round((amt/total)*100) : 0;
    return `<div class="bar-row">
      <div class="bar-icon-box" style="background:${cat.color}20">${cat.icon}</div>
      <div class="bar-body">
        <div class="bar-top">
          <span class="bar-name">${cat.name}</span>
          <span class="bar-amt">${fmtMoney(amt)} <span style="color:var(--muted);font-weight:400;font-size:11px">${pctT}%</span></span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cat.color}"></div></div>
      </div>
    </div>`;
  }).join('');

  const el = document.getElementById('txnList');
  if(!exps.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">💸</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">ยังไม่มีรายจ่าย</div><div style="font-size:13px">กด บันทึก เพื่อเพิ่มรายการแรก</div></div>`;
    return;
  }
  const groups = {};
  exps.forEach(e=>{(groups[e.date]=groups[e.date]||[]).push(e);});
  const gSorted = Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0]));
  el.innerHTML = `<div class="txn-card">`+gSorted.map(([date,items])=>{
    const dayTotal = items.reduce((s,e)=>s+e.amount,0);
    return `<div class="date-hdr"><span>${dateLbl(date)}</span><span style="color:var(--red);font-weight:700">${fmtMoney(dayTotal)}</span></div>`
      +items.map(e=>{
        const cat=getCat(e.categoryId);
        return `<div class="txn-row" onclick="openTxn('${e.id}')">
          <div class="bar-icon-box" style="background:${cat.color}20">${cat.icon}</div>
          <div class="txn-info">
            <div class="txn-name">${e.note||cat.name}</div>
            <div class="txn-cat">${cat.name}</div>
          </div>
          <div class="txn-amt">${fmtMoney(e.amount)}</div>
        </div>`;
      }).join('');
  }).join('')+`</div>`;
}

function changeMonth(dir) {
  st.dashMonth = shiftMonth(st.dashMonth, dir);
  renderDash();
}

// ADD PAGE
function initAddPage() {
  document.getElementById('addMonthLabel').textContent = monthStr(st.addMonth);
  document.getElementById('amtIn').value = '';
  document.getElementById('noteIn').value = '';
  const [cy,cm] = [new Date().getFullYear(), new Date().getMonth()+1];
  const [ay,am] = st.addMonth.split('-').map(Number);
  document.getElementById('dateIn').value =
    (ay===cy && am===cm) ? new Date().toISOString().slice(0,10) : st.addMonth+'-01';
  if(!st.selCat) st.selCat = st.cats[0]?.id || null;
  renderChips();
  setTimeout(()=>document.getElementById('amtIn').focus(), 100);
}

function changeAddMonth(dir) {
  st.addMonth = shiftMonth(st.addMonth, dir);
  document.getElementById('addMonthLabel').textContent = monthStr(st.addMonth);
  const [y,m]   = st.addMonth.split('-').map(Number);
  const [cy,cm] = [new Date().getFullYear(), new Date().getMonth()+1];
  document.getElementById('dateIn').value =
    (y===cy && m===cm) ? new Date().toISOString().slice(0,10) : st.addMonth+'-01';
}

function renderChips() {
  document.getElementById('catChips').innerHTML =
    st.cats.map(c=>`<button class="chip ${c.id===st.selCat?'sel':''}" onclick="pickCat('${c.id}')">${c.icon} ${c.name}</button>`).join('')
    +`<button class="chip-add" onclick="openCatSheet()">+ เพิ่ม</button>`;
}

function pickCat(id) { st.selCat=id; renderChips(); }

function saveExp() {
  const amt = parseFloat(document.getElementById('amtIn').value);
  if(!amt||amt<=0) { alert('กรุณาใส่จำนวนเงิน'); return; }
  if(!st.selCat)   { alert('กรุณาเลือกหมวดหมู่'); return; }
  const note = document.getElementById('noteIn').value.trim();
  const date = document.getElementById('dateIn').value || st.addMonth+'-01';
  st.expenses.push({id:uid(), amount:amt, note, date, categoryId:st.selCat});
  persist();
  document.getElementById('amtIn').value = '';
  document.getElementById('noteIn').value = '';
  const btn = document.getElementById('saveBtn');
  btn.textContent = '✓ บันทึกแล้ว';
  btn.style.background = 'var(--green)';
  setTimeout(()=>{ btn.textContent='บันทึก'; btn.style.background=''; }, 1400);
}

// TRANSACTION DETAIL
function openTxn(id) {
  const e = st.expenses.find(x=>x.id===id);
  if(!e) return;
  const cat = getCat(e.categoryId);
  document.getElementById('txnSheetTitle').textContent = e.note||cat.name;
  document.getElementById('txnSheetBody').innerHTML = `
    <div class="sheet-row"><span class="sheet-row-lbl">จำนวน</span><span class="sheet-row-val" style="color:var(--red);font-weight:700">${fmtMoney(e.amount)}</span></div>
    <div class="sheet-row"><span class="sheet-row-lbl">หมวดหมู่</span><span class="sheet-row-val">${cat.icon} ${cat.name}</span></div>
    <div class="sheet-row"><span class="sheet-row-lbl">วันที่</span><span class="sheet-row-val">${dateLbl(e.date)}</span></div>
    ${e.note?`<div class="sheet-row"><span class="sheet-row-lbl">บันทึก</span><span class="sheet-row-val">${e.note}</span></div>`:''}
  `;
  document.getElementById('txnDelBtn').onclick = ()=>{
    if(confirm('ลบรายการนี้?')){
      st.expenses = st.expenses.filter(x=>x.id!==id);
      persist(); closeSheet('txnOverlay'); renderDash();
    }
  };
  openSheet('txnOverlay');
}

// CATEGORY
function openCatSheet() {
  document.getElementById('newCatName').value = '';
  document.getElementById('newCatIcon').value = '';
  openSheet('catOverlay');
  setTimeout(()=>document.getElementById('newCatName').focus(), 320);
}

function saveCustomCat() {
  const name = document.getElementById('newCatName').value.trim();
  const icon = document.getElementById('newCatIcon').value.trim() || '🏷️';
  if(!name) { alert('กรุณาใส่ชื่อ'); return; }
  const color = EXTRA_COLORS[st.cats.length % EXTRA_COLORS.length];
  const newCat = {id:uid(), name, icon, color};
  st.cats.push(newCat);
  st.selCat = newCat.id;
  persist();
  closeSheet('catOverlay');
  renderChips();
}

// SHEETS
function openSheet(id) {
  const el = document.getElementById(id);
  el.style.display = 'flex';
  requestAnimationFrame(()=>el.classList.add('open'));
}
function closeSheet(id) {
  const el = document.getElementById(id);
  el.classList.remove('open');
  setTimeout(()=>el.style.display='none', 300);
}
function backdropClose(e, id) {
  if(e.target===document.getElementById(id)) closeSheet(id);
}

load();
renderDash();
document.getElementById('addMonthLabel').textContent = monthStr(st.addMonth);
</script>
</body>
</html>
