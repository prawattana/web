<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>รายจ่าย</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --primary: #6366f1;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --nav: 64px;
      --red: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);
      color: white;
      padding: 16px 20px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .month-nav { display: flex; align-items: center; gap: 10px; }
    .month-nav button {
      background: rgba(255,255,255,.2);
      border: none;
      color: white;
      width: 34px; height: 34px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .month-nav button:active { background: rgba(255,255,255,.35); }
    .month-label { font-size: 17px; font-weight: 700; }
    .total-card {
      background: rgba(255,255,255,.15);
      border-radius: 14px;
      padding: 14px 18px;
      backdrop-filter: blur(4px);
    }
    .total-lbl { font-size: 12px; opacity: .75; margin-bottom: 4px; }
    .total-amt { font-size: 30px; font-weight: 800; letter-spacing: -.5px; }
    .total-cnt { font-size: 12px; opacity: .65; margin-top: 3px; }

    /* ── CONTENT ── */
    .content { padding-bottom: calc(var(--nav) + 16px); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── LIST ── */
    .date-group { }
    .date-lbl {
      padding: 10px 18px 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      background: var(--bg);
      display: flex;
      justify-content: space-between;
    }
    .expense-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 18px;
      background: white;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .12s;
    }
    .expense-item:active { background: #f8fafc; }
    .cat-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .exp-info { flex: 1; min-width: 0; }
    .exp-note {
      font-size: 15px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .exp-cat { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .exp-amt { font-size: 16px; font-weight: 700; color: var(--red); flex-shrink: 0; }
    .empty {
      text-align: center;
      padding: 70px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 52px; margin-bottom: 12px; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: calc(var(--nav) + 18px);
      right: 20px;
      width: 58px; height: 58px;
      border-radius: 29px;
      background: var(--primary);
      color: white;
      border: none;
      font-size: 30px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(99,102,241,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      transition: transform .12s, box-shadow .12s;
    }
    .fab:active { transform: scale(.92); box-shadow: 0 2px 8px rgba(99,102,241,.4); }
    @media (min-width: 480px) { .fab { right: calc(50% - 220px); } }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 480px;
      height: var(--nav);
      background: white;
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 300;
    }
    .nav-btn {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px;
      border: none; background: none;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      transition: color .15s;
    }
    .nav-btn.active { color: var(--primary); }
    .nav-icon { font-size: 22px; line-height: 1; }

    /* ── BOTTOM SHEET ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 400;
      display: none; align-items: flex-end;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .sheet {
      background: white;
      border-radius: 22px 22px 0 0;
      width: 100%; max-width: 480px;
      padding: 10px 20px 30px;
      max-height: 92vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    .overlay.open .sheet { transform: translateY(0); }
    .handle {
      width: 38px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 10px auto 18px;
    }
    .sheet-title { font-size: 19px; font-weight: 800; margin-bottom: 20px; }

    /* ── FORM ── */
    .amount-wrap {
      display: flex; align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 22px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 12px;
    }
    .currency-sym { font-size: 24px; font-weight: 700; color: var(--muted); }
    .amount-input {
      font-size: 38px; font-weight: 800;
      width: 180px; border: none; outline: none;
      color: var(--primary); text-align: center;
      background: none; font-family: inherit;
    }
    .form-group { margin-bottom: 16px; }
    .form-lbl {
      font-size: 11px; font-weight: 700;
      color: var(--muted); margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .form-input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 12px; font-size: 15px;
      outline: none; font-family: inherit;
      background: var(--bg); color: var(--text);
      transition: border-color .15s;
    }
    .form-input:focus { border-color: var(--primary); }

    /* Category chips */
    .cat-grid { display: flex; flex-wrap: wrap; gap: 7px; }
    .cat-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 12px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      cursor: pointer; font-size: 13px; font-weight: 500;
      background: none; color: var(--text);
      font-family: inherit;
      transition: all .12s;
    }
    .cat-chip.sel {
      border-color: var(--primary);
      background: rgba(99,102,241,.08);
      color: var(--primary);
    }

    /* Buttons */
    .btn {
      width: 100%; padding: 15px;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: transform .1s, opacity .1s;
    }
    .btn:active { transform: scale(.98); opacity: .9; }
    .btn-primary { background: var(--primary); color: white; margin-top: 10px; }
    .btn-danger { background: var(--red); color: white; }
    .btn-ghost {
      background: var(--bg); color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .action-row { display: flex; gap: 10px; margin-top: 10px; }
    .action-row .btn { margin-top: 0; }
    .btn-sm {
      padding: 8px 16px;
      background: var(--primary); color: white;
      border: none; border-radius: 20px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }

    /* ── SUMMARY ── */
    .s-card {
      background: white; border-radius: 16px;
      padding: 16px; margin: 12px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .s-title {
      font-size: 11px; font-weight: 700;
      color: var(--muted); margin-bottom: 14px;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .stats-row { display: flex; gap: 8px; }
    .stat {
      flex: 1; background: var(--bg);
      border-radius: 12px; padding: 12px 8px;
      text-align: center;
    }
    .stat-val { font-size: 17px; font-weight: 800; color: var(--primary); }
    .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .bar-item { display: flex; align-items: center; gap: 10px; margin-bottom: 13px; }
    .bar-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .bar-info { flex: 1; min-width: 0; }
    .bar-top { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
    .bar-name { font-weight: 600; }
    .bar-amt { font-weight: 700; }
    .bar-pct { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 4px; }
    .bar-track { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }

    /* ── SETTINGS ── */
    .sec { padding: 16px 16px 0; }
    .sec-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .sec-title { font-size: 16px; font-weight: 800; }
    .cat-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .cat-row-name { flex: 1; font-size: 15px; font-weight: 500; }
    .del-btn {
      background: none; border: none;
      color: var(--red); font-size: 18px;
      cursor: pointer; padding: 4px 6px;
      border-radius: 8px;
      transition: background .12s;
    }
    .del-btn:active { background: #fee2e2; }

    /* Color picker */
    .color-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .color-dot {
      width: 34px; height: 34px; border-radius: 50%;
      cursor: pointer; border: 3px solid transparent;
      transition: border-color .15s, transform .15s;
    }
    .color-dot.sel { border-color: #1e293b; transform: scale(1.18); }

    .divider { height: 8px; background: var(--bg); }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-row">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="monthLabel"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="total-card">
    <div class="total-lbl">รายจ่ายรวมเดือนนี้</div>
    <div class="total-amt" id="totalAmt">฿0</div>
    <div class="total-cnt" id="totalCnt">0 รายการ</div>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <!-- Tab: รายการ -->
  <div id="tab-list" class="tab-content active">
    <div id="expList"></div>
  </div>

  <!-- Tab: สรุป -->
  <div id="tab-summary" class="tab-content">
    <div class="s-card">
      <div class="s-title">ภาพรวม</div>
      <div class="stats-row" id="statsRow"></div>
    </div>
    <div class="s-card">
      <div class="s-title">แยกตามหมวดหมู่</div>
      <div id="catBars"></div>
    </div>
  </div>

  <!-- Tab: จัดการ -->
  <div id="tab-settings" class="tab-content">
    <div class="sec">
      <div class="sec-header">
        <span class="sec-title">หมวดหมู่</span>
        <button class="btn-sm" onclick="openAddCat()">+ เพิ่ม</button>
      </div>
      <div id="catList"></div>
    </div>
    <div class="divider" style="margin-top:16px"></div>
    <div class="sec" style="padding-top:16px">
      <div class="sec-title" style="margin-bottom:12px">ข้อมูล</div>
      <button class="btn btn-danger" onclick="confirmClear()">ล้างข้อมูลทั้งหมด</button>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openAdd()">+</button>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-list" onclick="gotoTab('list')">
    <span class="nav-icon">📋</span><span>รายการ</span>
  </button>
  <button class="nav-btn" id="nav-summary" onclick="gotoTab('summary')">
    <span class="nav-icon">📊</span><span>สรุป</span>
  </button>
  <button class="nav-btn" id="nav-settings" onclick="gotoTab('settings')">
    <span class="nav-icon">⚙️</span><span>จัดการ</span>
  </button>
</nav>

<!-- EXPENSE SHEET -->
<div class="overlay" id="expOverlay" onclick="backdropClose(event,'expOverlay')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="expTitle">เพิ่มรายจ่าย</div>

    <div class="amount-wrap">
      <span class="currency-sym">฿</span>
      <input type="number" class="amount-input" id="amtIn" placeholder="0" inputmode="decimal">
    </div>

    <div class="form-group">
      <div class="form-lbl">หมวดหมู่</div>
      <div class="cat-grid" id="catChips"></div>
    </div>

    <div class="form-group">
      <div class="form-lbl">บันทึก</div>
      <input type="text" class="form-input" id="noteIn" placeholder="รายละเอียด (ไม่บังคับ)">
    </div>

    <div class="form-group">
      <div class="form-lbl">วันที่</div>
      <input type="date" class="form-input" id="dateIn">
    </div>

    <div id="expActions"></div>
  </div>
</div>

<!-- ADD CATEGORY SHEET -->
<div class="overlay" id="catOverlay" onclick="backdropClose(event,'catOverlay')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">เพิ่มหมวดหมู่</div>

    <div class="form-group">
      <div class="form-lbl">ชื่อ</div>
      <input type="text" class="form-input" id="catNameIn" placeholder="เช่น อาหาร, ค่าเช่า, ยา...">
    </div>

    <div class="form-group">
      <div class="form-lbl">ไอคอน (emoji)</div>
      <input type="text" class="form-input" id="catIconIn" placeholder="🍜" maxlength="4" style="font-size:24px;text-align:center">
    </div>

    <div class="form-group">
      <div class="form-lbl">สี</div>
      <div class="color-grid" id="colorGrid"></div>
    </div>

    <button class="btn btn-primary" onclick="saveCat()">บันทึกหมวดหมู่</button>
  </div>
</div>

<script>
// ──────────────── DATA ────────────────
const COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#14b8a6','#3b82f6','#6366f1','#8b5cf6','#ec4899','#64748b'];

const DEFAULT_CATS = [
  { id:'food',      name:'อาหาร',    icon:'🍜', color:'#f97316' },
  { id:'transport', name:'เดินทาง',  icon:'🚗', color:'#3b82f6' },
  { id:'shopping',  name:'ช้อปปิ้ง', icon:'🛍️', color:'#ec4899' },
  { id:'home',      name:'บ้าน',     icon:'🏠', color:'#22c55e' },
  { id:'health',    name:'สุขภาพ',   icon:'💊', color:'#ef4444' },
  { id:'entertain', name:'บันเทิง',  icon:'🎮', color:'#8b5cf6' },
  { id:'other',     name:'อื่นๆ',    icon:'📦', color:'#64748b' },
];

let st = {
  month: new Date().toISOString().slice(0,7),
  expenses: [],
  cats: [],
  editId: null,
  selCat: null,
  selColor: COLORS[6],
};

// ──────────────── STORAGE ────────────────
function load() {
  const c = localStorage.getItem('xp_cats');
  const e = localStorage.getItem('xp_data');
  st.cats = c ? JSON.parse(c) : DEFAULT_CATS;
  st.expenses = e ? JSON.parse(e) : [];
}
function persist() {
  localStorage.setItem('xp_cats', JSON.stringify(st.cats));
  localStorage.setItem('xp_data', JSON.stringify(st.expenses));
}

// ──────────────── HELPERS ────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function fmtMoney(n) {
  return '฿' + Number(n).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function getCat(id) {
  return st.cats.find(c => c.id === id) || { name:'ไม่ระบุ', icon:'❓', color:'#64748b' };
}

function monthStr(ym) {
  const [y, m] = ym.split('-');
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return months[parseInt(m)-1] + ' ' + (parseInt(y)+543);
}

function dateLbl(ds) {
  const d = new Date(ds + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((now - d) / 86400000);
  const dow = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'][d.getDay()];
  const mm = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][d.getMonth()];
  const label = dow + ' ' + d.getDate() + ' ' + mm;
  if (diff === 0) return 'วันนี้ · ' + label;
  if (diff === 1) return 'เมื่อวาน · ' + label;
  return label;
}

function monthExps() {
  return st.expenses.filter(e => e.date.startsWith(st.month));
}

// ──────────────── RENDER ────────────────
function render() { renderHeader(); renderCurrentTab(); }

function renderHeader() {
  document.getElementById('monthLabel').textContent = monthStr(st.month);
  const exps = monthExps();
  const total = exps.reduce((s,e) => s + e.amount, 0);
  document.getElementById('totalAmt').textContent = fmtMoney(total);
  document.getElementById('totalCnt').textContent = exps.length + ' รายการ';
}

function renderCurrentTab() {
  const el = document.querySelector('.tab-content.active');
  if (!el) return;
  const tab = el.id.replace('tab-','');
  if (tab === 'list') renderList();
  else if (tab === 'summary') renderSummary();
  else if (tab === 'settings') renderSettings();
}

function renderList() {
  const exps = monthExps();
  const el = document.getElementById('expList');
  if (!exps.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">💸</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:6px">ยังไม่มีรายจ่าย</div>
      <div style="font-size:13px">กด + เพื่อเพิ่มรายการแรก</div>
    </div>`;
    return;
  }
  const groups = {};
  exps.forEach(e => { (groups[e.date] = groups[e.date] || []).push(e); });
  const sorted = Object.entries(groups).sort((a,b) => b[0].localeCompare(a[0]));
  el.innerHTML = sorted.map(([date, items]) => {
    const dayTotal = items.reduce((s,e) => s+e.amount, 0);
    const rows = items.map(e => {
      const cat = getCat(e.categoryId);
      return `<div class="expense-item" onclick="openEdit('${e.id}')">
        <div class="cat-icon" style="background:${cat.color}22">${cat.icon}</div>
        <div class="exp-info">
          <div class="exp-note">${e.note || cat.name}</div>
          <div class="exp-cat">${cat.name}</div>
        </div>
        <div class="exp-amt">${fmtMoney(e.amount)}</div>
      </div>`;
    }).join('');
    return `<div class="date-group">
      <div class="date-lbl">
        <span>${dateLbl(date)}</span>
        <span style="color:var(--text);font-weight:700">${fmtMoney(dayTotal)}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

function renderSummary() {
  const exps = monthExps();
  const total = exps.reduce((s,e) => s+e.amount, 0);
  const days = new Set(exps.map(e=>e.date)).size;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-val">${exps.length}</div><div class="stat-lbl">รายการ</div></div>
    <div class="stat"><div class="stat-val">${days}</div><div class="stat-lbl">วันที่ใช้จ่าย</div></div>
    <div class="stat"><div class="stat-val">${days ? fmtMoney(Math.round(total/days)) : '฿0'}</div><div class="stat-lbl">เฉลี่ย/วัน</div></div>
  `;
  const catMap = {};
  exps.forEach(e => { catMap[e.categoryId] = (catMap[e.categoryId]||0) + e.amount; });
  const sorted = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxAmt = sorted[0]?.[1] || 1;
  document.getElementById('catBars').innerHTML = sorted.length === 0
    ? '<div style="color:var(--muted);text-align:center;padding:20px">ไม่มีข้อมูล</div>'
    : sorted.map(([cid, amt]) => {
        const cat = getCat(cid);
        const pct = Math.round((amt/maxAmt)*100);
        const pctTotal = total ? Math.round((amt/total)*100) : 0;
        return `<div class="bar-item">
          <div class="bar-icon" style="background:${cat.color}22">${cat.icon}</div>
          <div class="bar-info">
            <div class="bar-top">
              <span class="bar-name">${cat.name}</span>
              <span class="bar-amt">${fmtMoney(amt)}<span class="bar-pct">${pctTotal}%</span></span>
            </div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${pct}%;background:${cat.color}"></div>
            </div>
          </div>
        </div>`;
      }).join('');
}

function renderSettings() {
  document.getElementById('catList').innerHTML = st.cats.map(c => `
    <div class="cat-row">
      <div class="cat-icon" style="background:${c.color}22;width:36px;height:36px;font-size:18px;border-radius:10px">${c.icon}</div>
      <span class="cat-row-name">${c.name}</span>
      <button class="del-btn" onclick="deleteCat('${c.id}')">🗑️</button>
    </div>
  `).join('') || '<div style="color:var(--muted);padding:12px 0">ยังไม่มีหมวดหมู่</div>';
}

// ──────────────── NAVIGATION ────────────────
function gotoTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  document.getElementById('fab').style.display = tab === 'list' ? 'flex' : 'none';
  renderCurrentTab();
}

function changeMonth(dir) {
  const [y, m] = st.month.split('-').map(Number);
  const d = new Date(y, m-1+dir, 1);
  st.month = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  render();
}

// ──────────────── EXPENSE ────────────────
function openAdd() {
  st.editId = null;
  st.selCat = st.cats[0]?.id || null;
  document.getElementById('expTitle').textContent = 'เพิ่มรายจ่าย';
  document.getElementById('amtIn').value = '';
  document.getElementById('noteIn').value = '';
  document.getElementById('dateIn').value = new Date().toISOString().slice(0,10);
  document.getElementById('expActions').innerHTML = `<button class="btn btn-primary" onclick="saveExp()">บันทึก</button>`;
  renderChips();
  openSheet('expOverlay');
  setTimeout(() => document.getElementById('amtIn').focus(), 320);
}

function openEdit(id) {
  const e = st.expenses.find(x => x.id === id);
  if (!e) return;
  st.editId = id;
  st.selCat = e.categoryId;
  document.getElementById('expTitle').textContent = 'แก้ไขรายจ่าย';
  document.getElementById('amtIn').value = e.amount;
  document.getElementById('noteIn').value = e.note || '';
  document.getElementById('dateIn').value = e.date;
  document.getElementById('expActions').innerHTML = `
    <div class="action-row">
      <button class="btn btn-ghost" style="flex:1" onclick="delExp('${id}')">ลบ</button>
      <button class="btn btn-primary" style="flex:2" onclick="saveExp()">บันทึก</button>
    </div>`;
  renderChips();
  openSheet('expOverlay');
}

function saveExp() {
  const amt = parseFloat(document.getElementById('amtIn').value);
  if (!amt || amt <= 0) { alert('กรุณาใส่จำนวนเงิน'); return; }
  const note = document.getElementById('noteIn').value.trim();
  const date = document.getElementById('dateIn').value;
  if (!date) { alert('กรุณาเลือกวันที่'); return; }
  if (!st.selCat) { alert('กรุณาเลือกหมวดหมู่'); return; }

  if (st.editId) {
    const i = st.expenses.findIndex(e => e.id === st.editId);
    if (i >= 0) st.expenses[i] = { ...st.expenses[i], amount: amt, note, date, categoryId: st.selCat };
  } else {
    st.expenses.push({ id: uid(), amount: amt, note, date, categoryId: st.selCat });
  }
  persist();
  closeSheet('expOverlay');
  render();
}

function delExp(id) {
  if (!confirm('ลบรายการนี้?')) return;
  st.expenses = st.expenses.filter(e => e.id !== id);
  persist();
  closeSheet('expOverlay');
  render();
}

function renderChips() {
  document.getElementById('catChips').innerHTML = st.cats.map(c => `
    <button class="cat-chip ${c.id === st.selCat ? 'sel' : ''}" onclick="pickCat('${c.id}')">
      ${c.icon} ${c.name}
    </button>
  `).join('');
}

function pickCat(id) { st.selCat = id; renderChips(); }

// ──────────────── CATEGORY ────────────────
function openAddCat() {
  st.selColor = COLORS[Math.floor(Math.random() * COLORS.length)];
  document.getElementById('catNameIn').value = '';
  document.getElementById('catIconIn').value = '';
  renderColorGrid();
  openSheet('catOverlay');
  setTimeout(() => document.getElementById('catNameIn').focus(), 320);
}

function renderColorGrid() {
  document.getElementById('colorGrid').innerHTML = COLORS.map(c => `
    <div class="color-dot ${c === st.selColor ? 'sel' : ''}" style="background:${c}" onclick="pickColor('${c}')"></div>
  `).join('');
}

function pickColor(c) { st.selColor = c; renderColorGrid(); }

function saveCat() {
  const name = document.getElementById('catNameIn').value.trim();
  const icon = document.getElementById('catIconIn').value.trim() || '📦';
  if (!name) { alert('กรุณาใส่ชื่อหมวดหมู่'); return; }
  st.cats.push({ id: uid(), name, icon, color: st.selColor });
  persist();
  closeSheet('catOverlay');
  renderSettings();
}

function deleteCat(id) {
  if (st.cats.length <= 1) { alert('ต้องมีอย่างน้อย 1 หมวดหมู่'); return; }
  if (!confirm('ลบหมวดหมู่นี้? รายการที่ใช้หมวดหมู่นี้จะยังอยู่แต่ไม่มีหมวดหมู่')) return;
  st.cats = st.cats.filter(c => c.id !== id);
  persist();
  renderSettings();
}

function confirmClear() {
  if (!confirm('ล้างรายจ่ายทั้งหมด?\nไม่สามารถกู้คืนได้')) return;
  st.expenses = [];
  persist();
  render();
}

// ──────────────── SHEET ────────────────
function openSheet(id) {
  const el = document.getElementById(id);
  el.style.display = 'flex';
  requestAnimationFrame(() => el.classList.add('open'));
}

function closeSheet(id) {
  const el = document.getElementById(id);
  el.classList.remove('open');
  setTimeout(() => { el.style.display = 'none'; }, 300);
}

function backdropClose(e, id) {
  if (e.target === document.getElementById(id)) closeSheet(id);
}

// ──────────────── INIT ────────────────
load();
render();
</script>
</body>
</html>
